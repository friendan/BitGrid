<vbox id="main">
    <!-- 顶部功能按钮区域 -->
    <hbox id="toolbar" height="50" margin="5,5,5,0">
        <spacer width="10"></spacer>
        <button
            class="btn"
            id="btnSelect"
            width="100"
            text="选择窗口区域"
        ></button>
        <spacer width="10"></spacer>
        <textbox
            id="txtTotalPage"
            width="80"
            text="1"
            halign="center"
        ></textbox>
        <spacer width="10"></spacer>
        <button class="btn" id="btnShot" width="80" text="手动截图"></button>
        <spacer width="10"></spacer>
        <button
            class="btn"
            id="btnRecognize"
            width="80"
            text="手动识别"
        ></button>
        <spacer width="10"></spacer>
        <button
            class="btn"
            id="btnAutoAction"
            width="80"
            text="自动操作"
        ></button>
        <spacer width="10"></spacer>
        <button class="btn" id="btnClean" width="80" text="清理"></button>
        <spacer></spacer>
        <button class="btn" id="btnAbout" width="80" text="关于"></button>
        <spacer width="10"></spacer>
    </hbox>

    <!-- 中间日志输出区域 -->
    <vbox id="logContainer" margin="5">
        <textbox
            id="logBox"
            scrollbar="logScrollbar"
            readonly="true"
            multiline="true"
        >
        </textbox>
    </vbox>

    <!-- 底部状态栏（3栏） -->
    <hbox id="statusbar" height="30" margin="5,0,5,5">
        <label id="statusLeft" width="200" halign="left" text="就绪"></label>
        <spacer></spacer>
        <label id="statusCenter" width="200" halign="center" text=""></label>
        <spacer></spacer>
        <label id="statusRight" width="200" halign="right" text=""></label>
    </hbox>
</vbox>

<style>
    /* 主窗口样式 */
    #main {
        background-color: #f5f5f5;
    }

    /* 工具栏样式 */
    #toolbar {
        background-color: #ffffff;
        border: 1px #d0d0d0 solid;
        border-radius: 5px;
    }

    /* 按钮样式 */
    .btn {
        border-radius: 3px;
        border: 1px #c0c0c0 solid;
        background-color: #f0f0f0;
        font-size: 13px;
        color: #333333;
    }
    .btn:hover {
        border-color: #0078d4;
        background-color: #e5f1fb;
    }
    .btn:active {
        background-color: #cce4f7;
    }

    /* 日志容器样式 */
    #logContainer {
        background-color: #ffffff;
        border: 1px #d0d0d0 solid;
        border-radius: 5px;
    }

    /* 日志框样式 */
    #logBox {
        background-color: #ffffff;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 12px;
        border: none;
    }

    /* 状态栏样式 */
    #statusbar {
        background-color: #e8e8e8;
        border: 1px #d0d0d0 solid;
        border-radius: 3px;
    }

    #statusLeft,
    #statusCenter,
    #statusRight {
        font-size: 12px;
        color: #333333;
    }

    /* 滚动条样式 */
    #logScrollbar {
        border-radius: 3px;
        background-color: rgba(200, 200, 200, 0.3);
        fore-color: rgba(150, 150, 150, 0.8);
    }
    #logScrollbar:hover {
        fore-color: rgba(100, 100, 100, 0.9);
    }
    #logScrollbar:active {
        fore-color: rgba(80, 80, 80, 1);
    }
</style>
